apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-pv-writer
  namespace: nfs-static-pv-demo
  labels:
    app.kubernetes.io/name: nfs-pv-writer
    app.kubernetes.io/part-of: nfs-static-pv-demo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: nfs-pv-writer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nfs-pv-writer
        app.kubernetes.io/part-of: nfs-static-pv-demo
    spec:
      containers:
        - name: app
          image: registry.access.redhat.com/ubi9/python-312:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - python /opt/app/server.py
          env:
            - name: DATA_DIR
              value: /data
            - name: PORT
              value: "8080"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: app-code
              mountPath: /opt/app
            - name: nfs-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: app-code
          configMap:
            name: nfs-pv-writer-app
            defaultMode: 0755
        - name: nfs-data
          persistentVolumeClaim:
            claimName: static-nfs-pvc-demo

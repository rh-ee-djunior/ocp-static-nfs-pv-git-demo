apiVersion: v1
kind: ConfigMap
metadata:
  name: nfs-pv-writer-app
  namespace: nfs-static-pv-demo
  labels:
    app.kubernetes.io/name: nfs-pv-writer
data:
  server.py: |
    #!/usr/bin/env python3
    import hashlib
    import json
    import os
    import random
    import string
    import time
    from datetime import datetime, timezone
    from http.server import BaseHTTPRequestHandler, HTTPServer
    from urllib.parse import parse_qs, urlparse

    DATA_DIR = os.environ.get("DATA_DIR", "/data")
    PORT = int(os.environ.get("PORT", "8080"))

    os.makedirs(DATA_DIR, exist_ok=True)
    os.makedirs(os.path.join(DATA_DIR, "generated"), exist_ok=True)

    def now():
        return datetime.now(timezone.utc).isoformat()

    def sha256_file(path):
        h = hashlib.sha256()
        with open(path, "rb") as f:
            for chunk in iter(lambda: f.read(1024 * 1024), b""):
                h.update(chunk)
        return h.hexdigest()

    def list_files():
        files = []
        for root, _, names in os.walk(DATA_DIR):
            for name in sorted(names):
                path = os.path.join(root, name)
                rel = os.path.relpath(path, DATA_DIR)
                try:
                    stat = os.stat(path)
                    files.append({
                        "path": rel,
                        "size": stat.st_size,
                        "mtime": stat.st_mtime,
                        "sha256": sha256_file(path) if stat.st_size <= 10 * 1024 * 1024 else "skipped-large-file"
                    })
                except Exception as exc:
                    files.append({"path": rel, "error": str(exc)})
        return files

    def write_message(msg):
        record = {
            "timestamp": now(),
            "hostname": os.environ.get("HOSTNAME", "unknown"),
            "message": msg,
        }
        with open(os.path.join(DATA_DIR, "messages.jsonl"), "a", encoding="utf-8") as f:
            f.write(json.dumps(record, ensure_ascii=False) + "\n")
        with open(os.path.join(DATA_DIR, "last-write.txt"), "w", encoding="utf-8") as f:
            f.write(json.dumps(record, ensure_ascii=False, indent=2) + "\n")
        return record

    def generate_files(files=3, size_kb=32):
        files = max(1, min(int(files), 50))
        size_kb = max(1, min(int(size_kb), 1024))
        created = []
        alphabet = string.ascii_letters + string.digits
        for i in range(files):
            filename = f"generated/data-{int(time.time())}-{i}.txt"
            path = os.path.join(DATA_DIR, filename)
            with open(path, "w", encoding="utf-8") as f:
                f.write(f"created_at={now()}\n")
                f.write(f"hostname={os.environ.get('HOSTNAME', 'unknown')}\n")
                remaining = size_kb * 1024
                while remaining > 0:
                    line = "".join(random.choice(alphabet) for _ in range(120)) + "\n"
                    f.write(line)
                    remaining -= len(line.encode("utf-8"))
            created.append({"path": filename, "size": os.path.getsize(path), "sha256": sha256_file(path)})
        return created

    class Handler(BaseHTTPRequestHandler):
        def send_json(self, payload, status=200):
            body = json.dumps(payload, ensure_ascii=False, indent=2).encode("utf-8")
            self.send_response(status)
            self.send_header("Content-Type", "application/json; charset=utf-8")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            parsed = urlparse(self.path)
            qs = parse_qs(parsed.query)

            if parsed.path == "/healthz":
                self.send_json({"status": "ok", "time": now()})
                return

            if parsed.path == "/write":
                msg = qs.get("msg", [f"message-{now()}"])[0]
                record = write_message(msg)
                self.send_json({"written": record, "data_dir": DATA_DIR})
                return

            if parsed.path == "/generate":
                files = qs.get("files", ["3"])[0]
                size_kb = qs.get("size_kb", ["32"])[0]
                created = generate_files(files, size_kb)
                self.send_json({"created": created, "data_dir": DATA_DIR})
                return

            if parsed.path == "/list":
                self.send_json({"data_dir": DATA_DIR, "files": list_files()})
                return

            if parsed.path == "/":
                self.send_json({
                    "app": "nfs-pv-writer",
                    "purpose": "OpenShift static NFS PV migration test",
                    "data_dir": DATA_DIR,
                    "endpoints": {
                        "/write?msg=hello": "append message to persistent volume",
                        "/generate?files=5&size_kb=64": "generate test files in persistent volume",
                        "/list": "list files and hashes from persistent volume",
                        "/healthz": "health check"
                    },
                    "files": list_files()
                })
                return

            self.send_json({"error": "not found"}, status=404)

        def log_message(self, fmt, *args):
            print(f"{self.address_string()} - {fmt % args}")

    if __name__ == "__main__":
        server = HTTPServer(("0.0.0.0", PORT), Handler)
        print(f"Starting nfs-pv-writer on port {PORT}, DATA_DIR={DATA_DIR}")
        server.serve_forever()
